<div class="container">

<h1>Request Delivery</h1>
<label for="Restaurant name">Restaurant Name</label>
<input class="input" type="text" id="restaurant" placeholder="Enter restaurant name"><br><br>

<label>Pickup Location</label>
<input class="input" type="text" id="pickup" placeholder="Enter pickup location"><br><br>

<label>Delivery Location</label>
<input class="input" type="text" id="dropoff" placeholder="Enter delivery location"><br><br>

<label>Package Type</label>
<select id="package">
<option>Food</option>
<option>Beverages</option>
<option>Food and Beverages</option>
</select><br>

<button onclick="createOrder()">Request Delivery</button><br><br>
<a href="driver.html">Go to driver-dashboard and track delivery</a>

<div id="status" class="order-status"></div>

</div>

<script>

function createOrder(){

let pickup = document.getElementById("pickup").value;
let dropoff = document.getElementById("dropoff").value;
let packageType = document.getElementById("package").value;

if(pickup === "" || dropoff === ""){
alert("Please enter pickup and delivery locations");
return;
}

let orderID = Math.floor(Math.random()*100000);

document.getElementById("status").innerHTML =
"<b>Order Created!</b><br>" +
"Order ID: " + orderID + "<br>" +
"Package: " + packageType + "<br>" +
"Pickup: " + pickup + "<br>" +
"Delivery: " + dropoff + "<br><br>" +
"Status: Driver Assigned 🚚";

}

</script>
